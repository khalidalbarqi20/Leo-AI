<!-- Leo-AI-main/templates/index.html -->
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo AI</title>
    <style>
        body { font-family: 'Arial', sans-serif; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        #chat-box { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; }
        .message { margin: 10px 0; }
        .user { background-color: #e0e0e0; padding: 10px; border-radius: 5px; }
        .bot { background-color: #f0f0f0; padding: 10px; border-radius: 5px; }
        #message-input { width: 100%; padding: 10px; }
        .btn { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Leo AI</h1>
        <div id="chat-box"></div>
        <input type="text" id="message-input" placeholder="횠짠횢혘횠짧횠짢 횠짹횠쨀횠짠횢혙횠짧횢혘 횢혝횢혛횠짠...">
        <button class="btn" onclick="sendMessage()">횠짜횠짹횠쨀횠짠횢혙</button>
        <input type="file" id="file-input" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.gif,.txt,.zip,.tar.gz">
    </div>

    <script>
        let chatBox = document.getElementById('chat-box');
        let messageInput = document.getElementById('message-input');
        let fileInput = document.getElementById('file-input');

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message';
            const span = document.createElement('span');
            span.textContent = content;
            div.appendChild(role === 'user' ? 
                `<span style="float: right;">${role}</span>` : 
                `<span style="float: left;">${role}</span>`
            );
            div.appendChild(span);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            messageInput.value = '';

            try {
                // 횠짜횠짹횠쨀횠짠횢혙 횠짠횢혙횢혚횢혙횢혖횠짠횠짧 횠짜횠째횠짠 횢혘횠짠횢혛횠짧 횢혚횢혞횠짭횢혞횠짱횠짤
                const files = Array.from(fileInput.files);
                if (files.length > 0) {
                    const formData = new FormData();
                    formData.append('model', 'qwen/qwen3-coder-480b-a35b-instruct:free');
                    formData.append('message', message);
                    files.forEach(file => formData.append('files', file));
                    fetch('/chat', {
                        method: 'POST',
                        body: formData
                    }).then(response => response.json())
                      .then(data => appendMessage('bot', data.response))
                      .catch(error => appendMessage('bot', '횠짯횠짱횠짬 횠짰횠쨌횠짙 횠짙횠짬횢혛횠짠횠징 횢혚횠쨔횠짠횢혙횠짭횠짤 횠짠횢혙횢혚횢혙횢혖횠짠횠짧.'));
                } else {
                    // 횠짜횠짹횠쨀횠짠횢혙 횠짠횢혙횠짹횠쨀횠짠횢혙횠짤 횢혖횢혗횠쨌
                    fetch('/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ model: 'qwen/qwen3-coder-480b-a35b-instruct:free', message })
                    }).then(response => response.json())
                      .then(data => appendMessage('bot', data.response))
                      .catch(error => appendMessage('bot', '횠짯횠짱횠짬 횠짰횠쨌횠짙 횠짙횠짬횢혛횠짠횠징 횢혚횠쨔횠짠횢혙횠짭횠짤 횠짠횢혙횠짹횠쨀횠짠횢혙횠짤.'));
                }
            } catch (error) {
                appendMessage('bot', '횠짯횠짱횠짬 횠짰횠쨌횠짙 횠짙횠짬횢혛횠짠횠징 횢혚횠쨔횠짠횢혙횠짭횠짤 횠짠횢혙횠쨌횢혙횠짢.');
            }
        }

        // 횢혚횠쨔횠짠횢혙횠짭횠짤 횠짠횢혙횢혚횢혙횢혖횠짠횠짧
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                appendMessage('user', '횠짧횢혚 횠짧횠짯횢혚횢혡횢혙 횠짠횢혙횢혚횢혙횢혖횠짠횠짧.');
            }
        });
    </script>
</body>
</html>
