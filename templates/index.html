<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#0a0f1e">
<title>Leo-AI</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e; --bg2:#0d1426; --sf:#111827; --sf2:#1a2540;
  --bd:#1e2d4a; --bd2:#2a3f63;
  --ac:#b8c5d6; --ac2:#6b9fd4;
  --tx:#e8edf5; --mu:#6b7a99;
  --ok:#3ecf8e; --danger:#e85d6a; --warn:#e8a24a;
  --cbg:#080c18; --r:11px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);
     display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);height:52px;
     padding:0 7px;display:flex;align-items:center;gap:5px;
     flex-shrink:0;z-index:20;overflow:hidden}
.ddw{position:relative;flex-shrink:0}
.ddbtn{width:34px;height:34px;border-radius:8px;background:var(--sf);
       border:1px solid var(--bd);color:var(--ac);cursor:pointer;font-size:17px;
       display:flex;align-items:center;justify-content:center;transition:all .15s}
.ddbtn:active,.ddbtn.open{background:var(--sf2);border-color:var(--bd2)}
.ddm{position:fixed;top:52px;left:0;background:var(--bg2);
     border:1px solid var(--bd2);border-radius:0 12px 12px 0;
     min-width:210px;z-index:9999;overflow:hidden;
     transform:translateX(-110%);transition:transform .25s cubic-bezier(.4,0,.2,1);
     box-shadow:8px 0 32px rgba(0,0,0,.7)}
.ddm.show{transform:translateX(0)}
.dds{padding:4px 0}
.ddsep{height:1px;background:var(--bd);margin:3px 0}
.ddi{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
     font-size:13px;color:var(--tx);background:transparent;border:none;
     width:100%;text-align:right;text-decoration:none;transition:background .12s}
.ddi:active,.ddi:hover{background:var(--sf2)}
.ddi .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ddi .lbl{flex:1}
.ddi.danger:active,.ddi.danger:hover{background:rgba(232,93,106,.08)}
.ddi.danger .lbl{color:var(--danger)}
.logo{width:28px;height:28px;flex-shrink:0;background:linear-gradient(135deg,#1a2d4a,#0f1e38);
      border:1px solid var(--bd2);border-radius:8px;
      display:flex;align-items:center;justify-content:center;font-size:14px}
.rbadge{font-size:9px;border-radius:4px;padding:2px 5px;font-weight:700;
        flex-shrink:0;white-space:nowrap;letter-spacing:.4px}
.rbadge.admin{background:rgba(184,197,214,.1);color:var(--ac);border:1px solid rgba(184,197,214,.2)}
.rbadge.guest{background:rgba(107,159,212,.1);color:var(--ac2);border:1px solid rgba(107,159,212,.2)}
.hdrmid{flex:1;display:flex;justify-content:center;align-items:center;
        gap:4px;min-width:0;overflow:hidden}
.tabs{display:flex;background:var(--sf);border:1px solid var(--bd);
      border-radius:8px;padding:2px;gap:1px;flex-shrink:0}
.tab{padding:5px 8px;border-radius:6px;border:none;background:transparent;
     color:var(--mu);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab.on{background:var(--sf2);color:var(--tx);border:1px solid var(--bd2)}
.mpick{display:flex;align-items:center;gap:3px;background:var(--sf);border:1px solid var(--bd);
       border-radius:8px;padding:5px 7px;cursor:pointer;font-size:10.5px;color:var(--tx);
       max-width:88px;flex-shrink:1;min-width:0;transition:border-color .15s}
.mpick:active{border-color:var(--ac)}
.mpick .mn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;min-width:0;flex:1}
.mpick .arr{color:var(--mu);font-size:9px;flex-shrink:0;transition:transform .2s}
.mpick.open .arr{transform:rotate(180deg)}
.rfbtn{width:30px;height:30px;border-radius:7px;background:transparent;
       border:1px solid var(--bd);color:var(--mu);cursor:pointer;
       font-size:14px;display:flex;align-items:center;justify-content:center;
       flex-shrink:0;transition:all .15s}
.rfbtn:active{background:var(--sf2);color:var(--ac)}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
    opacity:0;pointer-events:none;transition:opacity .25s}
.ov.on{opacity:1;pointer-events:all}
.ddov{position:fixed;inset:0;z-index:9998;display:none}
.ddov.show{display:block}

/* MODEL SHEET */
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--bg2);
       border-radius:16px 16px 0 0;border-top:1px solid var(--bd2);
       transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
       max-height:85vh;display:flex;flex-direction:column}
.sheet.on{transform:translateY(0)}
.shbar{width:32px;height:3px;background:var(--bd2);border-radius:2px;
       margin:10px auto 0;flex-shrink:0}
.shhead{display:flex;align-items:center;justify-content:space-between;
        padding:11px 16px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.shttl{font-size:15px;font-weight:700}
.shx{width:26px;height:26px;background:var(--sf);border:none;border-radius:50%;
     color:var(--mu);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.shlist{overflow-y:auto;padding:6px 8px 28px;flex:1}
.shlist::-webkit-scrollbar{width:3px}
.shlist::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.mi{display:flex;align-items:center;gap:10px;padding:9px;border-radius:9px;
    cursor:pointer;transition:background .12s}
.mi:active,.mi:hover{background:var(--sf)}
.mi.sel{background:rgba(184,197,214,.06)}
.mi.automi{background:rgba(107,159,212,.05);border:1px solid rgba(107,159,212,.15);margin-bottom:6px}
.miico{width:34px;height:34px;background:var(--sf);border-radius:8px;
       display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mi.sel .miico{background:rgba(184,197,214,.1);border:1px solid rgba(184,197,214,.3)}
.mi.automi .miico{background:rgba(107,159,212,.1)}
.mibody{flex:1;min-width:0}
.miname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tg{font-size:9px;font-weight:700;border-radius:3px;padding:2px 5px}
.tg.c{background:rgba(62,207,142,.12);color:var(--ok)}
.tg.v{background:rgba(107,159,212,.15);color:var(--ac2)}
.tg.r{background:rgba(232,162,74,.12);color:var(--warn)}
.tg.p{background:rgba(184,197,214,.1);color:var(--ac)}
.midesc{font-size:10px;color:var(--mu);margin-top:1px}
.michk{color:var(--ac);font-size:15px;font-weight:700;opacity:0;flex-shrink:0}
.mi.sel .michk{opacity:1}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:12px;
      -webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
       flex:1;gap:16px;padding:20px;text-align:center}
.empty .elogo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#1a2d4a,#0f1e38);
              display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid var(--bd2)}
.empty h2{font-size:18px;font-weight:700;color:var(--ac)}
.empty p{font-size:12.5px;color:var(--mu);max-width:260px;line-height:1.6}
.row{display:flex;gap:10px;margin:2px 0;padding:2px 0}
.row.u{justify-content:flex-end}
.bbl{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.75;max-width:88%;word-wrap:break-word}
.bbl.u{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx)}
.bbl.a{background:transparent;border:none;color:var(--tx);width:100%;max-width:100%;padding:4px 0}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;flex-shrink:0;margin-top:2px}
.av.aa{background:linear-gradient(135deg,#19c37d,#ab68ff);order:-1}
.av.ua{background:linear-gradient(135deg,#ab68ff,#6b3fa0);order:-1}
.think{display:flex;align-items:center;gap:6px;padding:10px 14px;color:var(--mu);font-size:13px}
.think .dot{width:6px;height:6px;border-radius:50%;background:var(--ac2);animation:blink 1.4s infinite}
.think .dot:nth-child(2){animation-delay:.2s}
.think .dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* INPUT */
.inpw{background:var(--bg2);border-top:1px solid var(--bd);padding:8px 10px 10px;flex-shrink:0}
.inpb{display:flex;gap:6px;align-items:flex-end}
.inpta{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:10px;
       padding:9px 12px;font-size:14px;color:var(--tx);font-family:inherit;
       outline:none;resize:none;max-height:120px;min-height:40px;line-height:1.5}
.inpta:focus{border-color:var(--bd2)}
.inpta::placeholder{color:var(--mu)}
.inpbtns{display:flex;gap:5px;align-items:center}
.inpbtn{width:34px;height:34px;border-radius:8px;background:var(--sf);border:1px solid var(--bd);
        color:var(--mu);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
        transition:all .15s;flex-shrink:0}
.inpbtn:active{background:var(--sf2);color:var(--ac)}
.inpbtn.send{background:linear-gradient(135deg,#1a2d4a,#0f1e38);color:var(--ac);border-color:var(--bd2)}
.inpbtn.send:active{opacity:.85}
.inpbtn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>

  <header class="hdr">
    <div class="ddw">
      <button class="ddbtn" id="menuBtn" title="القائمة">☰</button>
    </div>
    <div class="hdrmid">
      <div class="mpick" id="modelPickBtn">
        <span class="mn" id="currentModelName">تحميل...</span>
        <span class="arr">▼</span>
      </div>
    </div>
  </header>

  <main class="chat" id="chatContainer">
    <div class="empty" id="emptyState">
      <div class="elogo">🤖</div>
      <h2>مرحباً بك في Leo-AI</h2>
      <p>اسألني عن أي شيء برمجياً أو تقنياً لأساعدك فيه بدقة.</p>
    </div>
  </main>

  <div class="inpw">
    <div class="inpb">
      <textarea class="inpta" id="msgInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
      <div class="inpbtns">
        <button class="inpbtn send" id="sendBtn" title="إرسال">⏎</button>
      </div>
    </div>
  </div>

  <div class="ov" id="sheetOverlay"></div>
  <div class="sheet" id="modelSheet">
    <div class="shbar"></div>
    <div class="shhead">
      <span class="shttl">اختر الموديل</span>
      <button class="shx" id="closeSheetBtn">✕</button>
    </div>
    <div class="shlist" id="modelsList">
      </div>
  </div>

<script>
// تعريف المتغيرات والعناصر الأساسية
const el = id => document.getElementById(id);
let models = [];
let currentModel = localStorage.getItem('selectedModel') || '';
let currentChatId = localStorage.getItem('currentChatId') || null;

// جلب الموديلات المتوفرة من الباك إيند
async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    models = data.models || data;
    
    if (models.length > 0) {
      if (!currentModel || !models.find(m => m.id === currentModel)) {
        currentModel = models[0].id;
      }
      renderModels();
      updateModelUI();
    }
  } catch (err) {
    console.error("خطأ في جلب الموديلات:", err);
    el('currentModelName').textContent = "خطأ في التحميل";
  }
}

// عرض الموديلات داخل القائمة المنسدلة (Sheet)
function renderModels() {
  const container = el('modelsList');
  container.innerHTML = '';
  
  models.forEach(model => {
    const isSelected = model.id === currentModel;
    const item = document.createElement('div');
    item.className = `mi ${isSelected ? 'sel' : ''}`;
    item.onclick = () => selectModel(model.id);
    
    item.innerHTML = `
      <div class="miico">🧠</div>
      <div class="mibody">
        <div class="miname">${model.name || model.id}</div>
        <div class="midesc">${model.description || 'موديل ذكاء اصطناعي متقدم'}</div>
      </div>
      <div class="michk">✓</div>
    `;
    container.appendChild(item);
  });
}

// تغيير الموديل المختار
function selectModel(modelId) {
  currentModel = modelId;
  localStorage.setItem('selectedModel', modelId);
  updateModelUI();
  renderModels();
  toggleSheet(false);
}

// تحديث اسم الموديل الظاهر في الهيدر
function updateModelUI() {
  const found = models.find(m => m.id === currentModel);
  el('currentModelName').textContent = found ? (found.name || found.id) : currentModel;
}

// فتح وإغلاق قائمة الموديلات
function toggleSheet(show) {
  el('modelSheet').classList.toggle('on', show);
  el('sheetOverlay').classList.toggle('on', show);
}

// إرسال الرسالة إلى السيرفر
async function sendMessage() {
  const input = el('msgInput');
  const text = input.value.trim();
  if (!text) return;
  
  // تصفير الحقل وتحديث الارتفاع
  input.value = '';
  input.style.height = 'auto';
  
  // إخفاء الحالة الفارغة إن وجدت
  el('emptyState').style.display = 'none';
  
  // إضافة رسالة المستخدم للواجهة
  appendMessage(text, 'u');
  
  // إضافة فقرة الانتظار (Thinking)
  const thinkDiv = appendThinking();
  
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        model: currentModel,
        chat_id: currentChatId
      })
    });
    
    thinkDiv.remove(); // إزالة تأثير التفكير بعد الرد
    
    if (!response.ok) throw new Error("فشل السيرفر في الرد");
    
    const data = await response.json();
    if (data.chat_id) {
      currentChatId = data.chat_id;
      localStorage.setItem('currentChatId', currentChatId);
    }
    
    appendMessage(data.response, 'a');
    
  } catch (err) {
    console.error(err);
    thinkDiv.remove();
    appendMessage("⚠️ حدث خطأ أثناء إرسال الرسالة، يرجى المحاولة مرة أخرى.", 'a');
  }
}

// إضافة الفقاعات للدردشة
function appendMessage(text, role) {
  const container = el('chatContainer');
  const row = document.createElement('div');
  row.className = `row ${role}`;
  
  const bbl = document.createElement('div');
  bbl.className = `bbl ${role}`;
  bbl.innerHTML = role === 'a' ? parseMarkdown(text) : escapeHTML(text);
  
  const av = document.createElement('div');
  av.className = `av ${role === 'u' ? 'ua' : 'aa'}`;
  av.textContent = role === 'u' ? '👤' : '🤖';
  
  row.appendChild(av);
  row.appendChild(bbl);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function appendThinking() {
  const container = el('chatContainer');
  const div = document.createElement('div');
  div.className = 'think';
  div.innerHTML = '<span>جاري التفكير</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

// معالجة النصوص البرمجية البسيطة (Markdown)
function parseMarkdown(html) {
  html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // تحويل الأكواد البرمجية المحاطة بـ ```
  html = html.replace(/```([\s\S]+?)```/g, '<div class="cw2"><pre><code>$1</code></pre></div>');
  // تحويل الأكواد السطرية المحاطة بـ `
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // الروابط الجديدة
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHTML(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
}

// تشغيل المستمعات (Event Listeners) عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', () => {
  loadModels();
  
  el('modelPickBtn').addEventListener('click', () => toggleSheet(true));
  el('closeSheetBtn').addEventListener('click', () => toggleSheet(false));
  el('sheetOverlay').addEventListener('click', () => toggleSheet(false));
  
  el('sendBtn').addEventListener('click', sendMessage);
  
  el('msgInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  // تمدد تلقائي لحقل النص عند الكتابة
  el('msgInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});
</script>
</body>
</html>
