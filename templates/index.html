<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo-AI</title>
<style>
/* ═══ Reset & Base ══════════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

:root {
  --bg:          #212121;
  --sidebar-bg:  #171717;
  --input-bg:    #2f2f2f;
  --border:      #3a3a3a;
  --user-bubble: #2f2f2f;
  --ai-bubble:   transparent;
  --accent:      #19c37d;
  --accent2:     #ab68ff;
  --text:        #ececec;
  --muted:       #8e8ea0;
  --code-bg:     #1a1a1a;
  --code-hdr:    #2a2a2a;
  --radius:      14px;
  --font:        'Segoe UI', system-ui, sans-serif;
}

html, body { height:100%; overflow:hidden }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ═══ Header ═══════════════════════════════════════════════════════════════ */
.header {
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #19c37d, #ab68ff);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-title { font-size: 16px; font-weight: 600; color: var(--text) }
.header-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px }

.header-actions { display:flex; gap:8px; align-items:center }
.hbtn {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; gap: 5px;
  transition: background .15s, border-color .15s;
}
.hbtn:hover { background: #3a3a3a; border-color: #555 }
.hbtn.danger { border-color: #ef4444; color: #ef4444 }
.hbtn.danger:hover { background: rgba(239,68,68,.12) }

/* ═══ Chat Container ════════════════════════════════════════════════════════ */
.chat-wrap {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
  padding-bottom: 16px;
}
.chat-wrap::-webkit-scrollbar { width: 5px }
.chat-wrap::-webkit-scrollbar-track { background: transparent }
.chat-wrap::-webkit-scrollbar-thumb { background: #444; border-radius: 4px }

/* ═══ Welcome Screen ════════════════════════════════════════════════════════ */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 140px);
  padding: 30px 20px;
  text-align: center;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }

.welcome-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #19c37d22, #ab68ff22);
  border: 2px solid #19c37d44;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  margin-bottom: 20px;
}
.welcome-title { font-size: 26px; font-weight: 700; margin-bottom: 8px }
.welcome-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.6 }

.chips { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:600px }
.chip {
  background: var(--input-bg);
  border: 1px solid var(--border);
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 13px;
  cursor: pointer;
  color: var(--muted);
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(25,195,125,.08) }

/* ═══ Messages ══════════════════════════════════════════════════════════════ */
#messages { padding: 10px 0 }

.msg-row {
  display: flex;
  padding: 6px 20px;
  gap: 14px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
  animation: fadeUp .25s ease;
}
.msg-row.user { justify-content: flex-end }
.msg-row.ai   { justify-content: flex-start }

/* Avatar */
.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  margin-top: 4px;
}
.avatar.ai-av {
  background: linear-gradient(135deg, #19c37d, #ab68ff);
  order: -1;
}
.avatar.user-av {
  background: linear-gradient(135deg, #ab68ff, #6b3fa0);
}

/* Bubble */
.bubble {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14.5px;
  line-height: 1.7;
  word-break: break-word;
}
.bubble.user {
  background: var(--user-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.bubble.ai {
  background: var(--ai-bubble);
  color: var(--text);
  border-bottom-right-radius: 4px;
  width: 100%;
  max-width: 100%;
}

/* Markdown inside AI bubble */
.bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
  color: var(--accent); margin: 14px 0 6px; font-weight: 600;
}
.bubble.ai h1 { font-size: 18px }
.bubble.ai h2 { font-size: 16px }
.bubble.ai h3 { font-size: 14px }
.bubble.ai p  { margin: 6px 0 }
.bubble.ai code {
  background: var(--code-bg);
  padding: 2px 7px;
  border-radius: 5px;
  font-family: 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  color: #ff9e64;
  border: 1px solid #333;
}
.bubble.ai blockquote {
  border-right: 3px solid var(--accent);
  padding-right: 12px;
  margin: 8px 0;
  color: var(--muted);
  font-style: italic;
}
.bubble.ai li { margin: 5px 0; padding-right: 4px }
.bubble.ai strong { color: #fff }

/* Code Block */
.code-wrap {
  background: var(--code-bg);
  border-radius: 10px;
  margin: 12px 0;
  border: 1px solid var(--border);
  overflow: hidden;
}
.code-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: var(--code-hdr);
  border-bottom: 1px solid var(--border);
}
.code-hdr span {
  color: var(--muted);
  font-size: 12px;
  font-family: monospace;
  font-weight: 600;
}
.code-hdr button {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
.code-hdr button:hover { background: #3a3a3a; color: var(--text) }
.code-hdr button.ok { color: var(--accent); border-color: var(--accent) }
.code-wrap pre {
  margin: 0; padding: 14px 16px;
  overflow-x: auto;
  font-size: 13px;
  line-height: 1.6;
}
.code-wrap pre code {
  background: none !important;
  padding: 0 !important;
  border: none !important;
  color: #cdd6f4;
  font-family: 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
}
.code-wrap::-webkit-scrollbar { height: 4px }
.code-wrap::-webkit-scrollbar-thumb { background: #444 }

/* ═══ Thinking Spinner (circle) ═════════════════════════════════════════════ */
#thinking {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 8px 20px;
  gap: 14px;
  align-items: center;
}
#thinking.on { display: flex }

.spinner-ring {
  width: 28px; height: 28px;
  border: 3px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg) } }
.thinking-txt { color: var(--muted); font-size: 13px }

/* ═══ Files ═════════════════════════════════════════════════════════════════ */
#files-section {
  max-width: 860px;
  margin: 6px auto;
  padding: 0 20px;
}
.files-box {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.files-box-hdr {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}
.file-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.file-item:last-child { border-bottom: none }
.file-item:hover { background: #353535 }
.file-item span { font-size: 13px; color: var(--muted) }
.file-item button {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all .15s;
}
.file-item button:hover { background: rgba(25,195,125,.15) }

/* ═══ Input Area ════════════════════════════════════════════════════════════ */
.input-area {
  background: var(--bg);
  padding: 10px 20px 16px;
  flex-shrink: 0;
}
.input-wrap {
  max-width: 760px;
  margin: 0 auto;
}
.input-box {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 14px;
  display: flex;
  align-items: flex-end;
  gap: 6px;
  transition: border-color .15s;
}
.input-box:focus-within { border-color: #555 }
.input-box textarea {
  flex: 1;
  background: transparent;
  color: var(--text);
  border: none;
  outline: none;
  font-family: var(--font);
  font-size: 14.5px;
  line-height: 1.6;
  resize: none;
  min-height: 28px;
  max-height: 180px;
  padding: 4px 0;
}
.input-box textarea::placeholder { color: var(--muted) }

.send-btn {
  width: 36px; height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 9px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, background .15s;
}
.send-btn:hover { opacity: .85 }
.send-btn:disabled { background: #444; cursor: not-allowed }
.send-btn svg { width:16px; height:16px; fill:#111 }

/* File attach row */
.file-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.file-label {
  display: flex; align-items: center; gap: 6px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--muted);
  transition: all .15s;
}
.file-label:hover { border-color: var(--accent); color: var(--accent) }
#file-input { display: none }
#file-name {
  font-size: 12px;
  color: var(--accent);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.input-hint {
  text-align: center;
  font-size: 11px;
  color: #555;
  margin-top: 8px;
}

/* ═══ Responsive ════════════════════════════════════════════════════════════ */
@media (max-width: 600px) {
  .bubble { max-width: 90% }
  .header-subtitle { display: none }
  .hbtn span { display: none }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-brand">
    <div class="header-logo">🚀</div>
    <div>
      <div class="header-title">Leo-AI</div>
      <div class="header-subtitle">مساعد البرمجة</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="saveChat()">💾 <span>حفظ</span></button>
    <button class="hbtn" onclick="showSaved()">📂 <span>المحفوظة</span></button>
    <button class="hbtn danger" onclick="clearChat()">🗑️ <span>مسح</span></button>
  </div>
</div>

<!-- ── Chat ───────────────────────────────────────────────────────────────── -->
<div class="chat-wrap" id="chatWrap">

  <!-- Welcome (يختفي عند أول رسالة) -->
  <div id="welcome">
    <div class="welcome-icon">🤖</div>
    <div class="welcome-title">مرحباً، أنا Leo-AI</div>
    <div class="welcome-sub">مساعدك الشخصي لكتابة الأكواد البرمجية<br>اكتب طلبك أو اختر مثالاً أدناه</div>
    <div class="chips">
      <span class="chip" onclick="setPrompt('اكتب موقع HTML و CSS جميل للبورتفوليو')">🌐 موقع HTML</span>
      <span class="chip" onclick="setPrompt('اكتب API بـ FastAPI مع قاعدة بيانات SQLite')">⚡ FastAPI API</span>
      <span class="chip" onclick="setPrompt('اكتب بوت تيليجرام بـ Python يجيب على الرسائل')">🤖 بوت تيليجرام</span>
      <span class="chip" onclick="setPrompt('اكتب سكريبت Python يقرأ CSV ويحوله لـ JSON')">🐍 Python Script</span>
      <span class="chip" onclick="setPrompt('اكتب مكون React جميل لقائمة مهام')">⚛️ React</span>
      <span class="chip" onclick="setPrompt('اشرح لي الفرق بين async و sync في JavaScript')">📖 شرح</span>
    </div>
  </div>

  <!-- رسائل المحادثة -->
  <div id="messages"></div>

  <!-- مؤشر التفكير (spinner دائري) -->
  <div id="thinking">
    <div class="spinner-ring"></div>
    <span class="thinking-txt">Leo-AI يفكر...</span>
  </div>

</div>

<!-- ── ملفات قابلة للتحميل ─────────────────────────────────────────────────── -->
<div id="files-section"></div>

<!-- ── Input ──────────────────────────────────────────────────────────────── -->
<div class="input-area">
  <div class="input-wrap">
    <div class="file-row">
      <label class="file-label" for="file-input">
        📎 إرفاق ملف
      </label>
      <input type="file" id="file-input"
        accept="image/*,.txt,.py,.js,.html,.css,.json,.md,.jsx,.ts,.tsx,.vue,.php,.java,.cpp,.c,.go,.rs,.swift,.kt,.dart,.rb,.sql,.xml,.yaml,.yml,.zip,.tar,.tar.gz,.tgz,.tar.bz2">
      <span id="file-name"></span>
    </div>
    <div class="input-box">
      <textarea id="prompt" placeholder="اكتب طلبك البرمجي..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="إرسال">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter للإرسال • Shift+Enter لسطر جديد</div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const pendingFiles = {}; // name -> code

// ── DOM refs ──────────────────────────────────────────────────────────────
const chatWrap    = document.getElementById('chatWrap');
const messagesEl  = document.getElementById('messages');
const thinkingEl  = document.getElementById('thinking');
const welcomeEl   = document.getElementById('welcome');
const filesSection= document.getElementById('files-section');
const promptEl    = document.getElementById('prompt');
const sendBtn     = document.getElementById('sendBtn');
const fileInput   = document.getElementById('file-input');
const fileNameEl  = document.getElementById('file-name');

// ── File input display ────────────────────────────────────────────────────
fileInput.addEventListener('change', () => {
  fileNameEl.textContent = fileInput.files[0] ? fileInput.files[0].name : '';
});

// ── Auto-resize textarea ──────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

// ── Keyboard ──────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── Quick chips ───────────────────────────────────────────────────────────
function setPrompt(text) {
  promptEl.value = text;
  promptEl.focus();
  autoResize(promptEl);
}

// ── Scroll to bottom ──────────────────────────────────────────────────────
function scrollBottom() {
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

// ── Append message bubble ─────────────────────────────────────────────────
function appendMsg(role, content) {
  welcomeEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'ai') {
    row.innerHTML = `
      <div class="avatar ai-av">🤖</div>
      <div class="bubble ai">${content}</div>`;
  } else {
    row.innerHTML = `
      <div class="bubble user">${escapeHtml(content)}</div>
      <div class="avatar user-av">👤</div>`;
  }
  messagesEl.appendChild(row);
  scrollBottom();
  return row;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Render download files ─────────────────────────────────────────────────
function renderFiles(files) {
  if (!files || !Object.keys(files).length) return;
  Object.assign(pendingFiles, files);

  let html = '<div class="files-box"><div class="files-box-hdr">📁 ملفات جاهزة للتحميل</div>';
  for (const [name] of Object.entries(files)) {
    html += `
      <div class="file-item">
        <span>📄 ${escapeHtml(name)}</span>
        <button onclick="downloadFile('${escapeHtml(name)}')">💾 تحميل</button>
      </div>`;
  }
  html += '</div>';
  filesSection.innerHTML = html;
}

async function downloadFile(name) {
  const code = pendingFiles[name];
  if (!code) return;
  const fd = new FormData();
  fd.append('filename', name);
  fd.append('code_content', code);
  const res = await fetch('/download', { method:'POST', body: fd });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

// ── Copy code ─────────────────────────────────────────────────────────────
function cpy(btn, b64) {
  const code = atob(b64);
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✅ تم';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋 نسخ'; btn.classList.remove('ok'); }, 1500);
  });
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const text = promptEl.value.trim();
  if (!text || sendBtn.disabled) return;

  // Add user bubble
  appendMsg('user', text);

  // Clear input
  promptEl.value = '';
  promptEl.style.height = 'auto';

  // Show spinner
  sendBtn.disabled = true;
  thinkingEl.classList.add('on');
  scrollBottom();

  // Build form data
  const fd = new FormData();
  fd.append('prompt', text);
  if (fileInput.files[0]) {
    fd.append('file', fileInput.files[0]);
    fileInput.value = '';
    fileNameEl.textContent = '';
  }

  try {
    const res = await fetch('/chat', { method: 'POST', body: fd });
    const data = await res.json();

    thinkingEl.classList.remove('on');
    sendBtn.disabled = false;

    if (data.error) {
      appendMsg('ai', `<p style="color:#ef4444">❌ ${escapeHtml(data.error)}</p>`);
    } else {
      appendMsg('ai', data.ai_html);
      if (data.files) renderFiles(data.files);
    }
  } catch (err) {
    thinkingEl.classList.remove('on');
    sendBtn.disabled = false;
    appendMsg('ai', `<p style="color:#ef4444">❌ خطأ في الاتصال: ${escapeHtml(String(err))}</p>`);
  }

  promptEl.focus();
}

// ── Clear chat ────────────────────────────────────────────────────────────
async function clearChat() {
  if (!confirm('هل تريد مسح المحادثة الحالية؟')) return;

  try {
    await fetch('/clear', { method: 'POST' });
  } catch (_) {}

  // ✅ مسح فوري للـ DOM
  messagesEl.innerHTML = '';
  filesSection.innerHTML = '';
  thinkingEl.classList.remove('on');
  sendBtn.disabled = false;
  welcomeEl.style.display = 'flex';
  Object.keys(pendingFiles).forEach(k => delete pendingFiles[k]);
}

// ── Save / Load ───────────────────────────────────────────────────────────
function saveChat() {
  if (!messagesEl.children.length) { alert('لا يوجد شيء للحفظ'); return }
  const saved = JSON.parse(localStorage.getItem('leoai') || '[]');
  const first = messagesEl.querySelector('.bubble.user');
  saved.unshift({
    id: Date.now(),
    title: (first?.textContent || 'محادثة').substring(0, 45),
    date: new Date().toLocaleString('ar-SA'),
    html: messagesEl.innerHTML,
  });
  if (saved.length > 15) saved.pop();
  localStorage.setItem('leoai', JSON.stringify(saved));
  alert('✅ تم حفظ المحادثة');
}

function showSaved() {
  const saved = JSON.parse(localStorage.getItem('leoai') || '[]');
  if (!saved.length) { alert('لا توجد محادثات محفوظة'); return }
  const list = saved.map((c, i) => `${i+1}. ${c.title}... (${c.date})`).join('\n');
  const num = prompt('اختر رقم المحادثة:\n' + list + '\n\nاكتب الرقم:');
  if (num) {
    const c = saved[parseInt(num) - 1];
    if (c) {
      welcomeEl.style.display = 'none';
      messagesEl.innerHTML = c.html;
      scrollBottom();
    }
  }
}
</script>
</body>
</html>
