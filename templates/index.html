<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo-AI Pro Station</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0d0e12;
            color: #e2e8f0;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 1000px;
            background-color: #161821;
            padding: 25px; border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            margin-top: 10px;
        }
        h1 { color: #ffb454; text-align: center; font-size: 24px; margin-bottom: 25px; }
        textarea {
            width: 100%; height: 130px;
            background-color: #090a0f; color: #f8fafc;
            border: 1px solid #2e3440; border-radius: 10px;
            padding: 15px; box-sizing: border-box; font-size: 16px; resize: vertical;
        }
        .file-upload-area {
            margin-top: 15px; display: flex; align-items: center; gap: 15px;
            background-color: #1f2335; padding: 12px; border-radius: 10px; border: 1px dashed #414868;
        }
        .file-upload-area input[type="file"] { color: #a9b1d6; }
        button.btn-submit {
            background-color: #ffb454; color: #0d0e12; border: none;
            padding: 14px; font-size: 16px; font-weight: bold; border-radius: 10px;
            cursor: pointer; margin-top: 15px; width: 100%; transition: all 0.2s ease;
        }
        button.btn-submit:hover { background-color: #f7a23b; }
        .result-container {
            margin-top: 30px; background-color: #090a0f;
            padding: 25px; border-radius: 12px; border-right: 4px solid #ffb454;
        }
        .action-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action {
            padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-copy { background-color: #414868; color: #ffffff; }
        .btn-download { background-color: #73daca; color: #111216; }
        pre { border-radius: 8px; direction: ltr; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 منصة Leo-AI المتقدمة (رفع ملفات + تحميل كود جاهز)</h1>
    
    <form method="post" enctype="multipart/form-data">
        <textarea name="prompt" placeholder="اشرح الكود المطلوب، أو ارفع صورة لتصميم تريد تحويله لكود، أو ارفع ملف كود قديم لتعديله..." required>{{ user_prompt if user_prompt }}</textarea>
        
        <div class="file-upload-area">
            <span style="font-size: 14px; color: #ff9e64; font-weight: bold;">📎 إرفاق ملف أو صورة:</span>
            <input type="file" name="file" accept="image/*,.txt,.py,.js,.html,.css,.json">
        </div>

        <button type="submit" class="btn-submit">توليد وتحليل البرمجيات فوراً</button>
    </form>

    {% if response %}
    <div class="result-container">
        <div style="color: #94a3b8; font-size: 14px; margin-bottom: 12px;">💬 التقرير والتحليل البرمجي الصادر:</div>
        
        {% if raw_code %}
        <div class="action-bar">
            <button class="btn-action btn-copy" onclick="copyToClipboard()">📋 نسخ الكود النظيف</button>
            <form action="/download" method="post" style="display:inline;">
                <input type="hidden" name="code_content" value="{{ raw_code }}">
                <button type="submit" class="btn-action btn-download">💾 تحميل كملف جاهز كاملاً</button>
            </form>
        </div>
        {% endif %}

        <pre><code class="language-markdown">{{ response }}</code></pre>
    </div>
    {% endif %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<script>
function copyToClipboard() {
    // كود جافا سكريبت لنسخ النص البرمجي بضغطة زر واحدة
    const codeText = `{{ raw_code | safe }}`;
    navigator.clipboard.writeText(codeText).then(() => {
        alert("تم نسخ الكود النظيف إلى الحافظة بنجاح!");
    }).catch(err => {
        alert("فشل النسخ: " + err);
    });
}
</script>
</body>
</html>
