<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo-AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0e12;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.hdr{background:#161821;padding:10px 15px;border-bottom:1px solid #2e3440;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr h1{color:#ffb454;font-size:16px;flex:1}
.hdr button{background:#2e3440;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold}
.hdr button:hover{background:#414868}
.hdr .red{background:#ef4444}
.hdr .red:hover{background:#dc2626}
.chat{flex:1;overflow-y:auto;padding:10px;max-width:800px;width:100%;margin:0 auto}
.msg{margin-bottom:12px;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-u{display:flex;justify-content:flex-start}
.msg-a{display:flex;justify-content:flex-end}
.bbl{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6}
.bbl-u{background:#ffb454;color:#0d0e12;border-bottom-left-radius:3px}
.bbl-a{background:#1f2335;border:1px solid #2e3440;border-bottom-right-radius:3px}
.bbl-a h1,.bbl-a h2,.bbl-a h3{color:#ffb454;margin:8px 0 4px;font-size:14px}
.bbl-a p{margin:4px 0}
.bbl-a code{background:#0d0e12;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px;color:#ff9e64}
.bbl-a blockquote{border-right:3px solid #ffb454;padding-right:8px;margin:4px 0;color:#94a3b8}
.bbl-a li{margin:3px 0}
.code-wrap{background:#0d0e12;border-radius:8px;margin:8px 0;border:1px solid #2e3440;overflow:hidden}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#161821;border-bottom:1px solid #2e3440}
.code-hdr span{color:#ff9e64;font-size:11px;font-family:monospace}
.code-hdr button{background:#414868;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.code-hdr button:hover{background:#565f89}
.code-hdr button.ok{background:#73daca;color:#111}
.code-wrap pre{margin:0;padding:10px;overflow-x:auto;font-size:12px}
.code-wrap code{font-family:monospace}
.input-area{background:#161821;border-top:1px solid #2e3440;padding:8px 12px;flex-shrink:0}
.input-box{max-width:800px;margin:0 auto;display:flex;gap:6px;align-items:flex-end}
.input-box textarea{flex:1;background:#090a0f;color:#fff;border:1px solid #2e3440;border-radius:10px;padding:8px 12px;font-size:13px;resize:none;min-height:36px;max-height:120px;font-family:inherit}
.input-box textarea:focus{outline:none;border-color:#ffb454}
.snd{width:36px;height:36px;background:#ffb454;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.snd:hover{opacity:.9}
.snd:disabled{opacity:.5;cursor:not-allowed}
.snd.stop{background:#ef4444;color:#fff}
.file-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;max-width:800px;margin:0 auto 6px}
.file-row span{color:#ff9e64;font-size:11px}
.file-row input{color:#a9b1d6;font-size:11px}
.files-box{margin:8px auto;max-width:800px;padding:8px;background:#0d0e12;border-radius:8px;border:1px solid #2e3440}
.files-box h4{color:#73daca;font-size:12px;margin-bottom:6px}
.file-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#1f2335;border-radius:5px;margin-bottom:4px;border:1px solid #2e3440}
.file-item span{font-size:12px}
.file-item button{background:#73daca;color:#111;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold}
.typing{display:none;align-items:center;gap:4px;padding:8px;color:#94a3b8;font-size:12px}
.typing.on{display:flex}
.typing i{width:6px;height:6px;background:#ffb454;border-radius:50%;animation:b 1s infinite}
.typing i:nth-child(2){animation-delay:.2s}
.typing i:nth-child(3){animation-delay:.4s}
@keyframes b{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.empty{text-align:center;padding:40px 20px;color:#94a3b8}
.empty h2{color:#ffb454;margin-bottom:8px;font-size:20px}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:15px}
.chip{background:#1f2335;border:1px solid #2e3440;padding:6px 12px;border-radius:14px;font-size:11px;cursor:pointer;color:#a9b1d6}
.chip:hover{border-color:#ffb454;color:#ffb454}
@media(max-width:600px){.bbl{max-width:92%}}
</style>
</head>
<body>
<div class="hdr">
  <h1>🚀 Leo-AI</h1>
  <button onclick="saveChat()">💾</button>
  <button onclick="showSaved()">📂</button>
  <button class="red" onclick="clearChat()">🗑️</button>
</div>
<div class="chat" id="chat">
  <div class="empty" id="welcome">
    <h2>👋 مرحباً</h2>
    <p>اكتب طلبك وانا راح اساعدك بالكود فوراً</p>
    <div class="chips">
      <span class="chip" onclick="setP('اكتب موقع HTML+CSS')">🌐 موقع</span>
      <span class="chip" onclick="setP('اكتب API FastAPI')">⚡ API</span>
      <span class="chip" onclick="setP('بوت تيليجرام')">🤖 بوت</span>
      <span class="chip" onclick="setP('تعديل كود')">🔧 تعديل</span>
    </div>
  </div>
  <div id="msgs"></div>
  <div class="typing" id="type"><span>Leo-AI يكتب</span><i></i><i></i><i></i></div>
</div>
<div id="fsec"></div>
<div class="input-area">
  <div class="file-row">
    <span>📎 ملف:</span>
    <input type="file" id="fileInput" accept="image/*,.txt,.py,.js,.html,.css,.json,.md,.jsx,.ts,.tsx,.vue,.php,.java,.cpp,.c,.go,.rs,.rb,.sql,.xml,.yaml,.yml">
  </div>
  <div class="input-box">
    <textarea id="pt" placeholder="اكتب طلبك..." rows="1" onkeydown="kd(event)" oninput="ar(this)"></textarea>
    <button class="snd" id="sb" onclick="toggleSend()">➤</button>
  </div>
</div>
<script>
let streaming = false;
let abortCtrl = null;
const pf = {};
const pt = document.getElementById('pt');
const sb = document.getElementById('sb');
const msgs = document.getElementById('msgs');
const type = document.getElementById('type');
const fsec = document.getElementById('fsec');
const welcome = document.getElementById('welcome');

function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function kd(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();toggleSend()}}
function setP(t){pt.value=t;pt.focus();ar(pt)}
function bot(){document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function setStreaming(active){
  streaming=active;
  sb.classList.toggle('stop',active);
  sb.textContent=active?'⏹':'➤';
  sb.title=active?'إيقاف':'إرسال';
}

function toggleSend(){
  if(streaming){stopStream();}else{send();}
}

async function stopStream(){
  if(abortCtrl){abortCtrl.abort();abortCtrl=null;}
  setStreaming(false);
  type.classList.remove('on');
}

async function send(){
  const txt=pt.value.trim();
  if(!txt||streaming)return;

  welcome.style.display='none';
  setStreaming(true);

  // User message
  const uRow=document.createElement('div');
  uRow.className='msg msg-u';
  uRow.innerHTML='<div class="bbl bbl-u">'+esc(txt)+'</div>';
  msgs.appendChild(uRow);

  pt.value='';pt.style.height='auto';
  bot();

  // AI placeholder
  const aRow=document.createElement('div');
  aRow.className='msg msg-a';
  aRow.id='ai-current';
  aRow.innerHTML='<div class="bbl bbl-a"><span style="color:#94a3b8">...</span></div>';
  msgs.appendChild(aRow);

  type.classList.add('on');
  bot();

  const fd=new FormData();
  fd.append('prompt',txt);
  const fileInput=document.getElementById('fileInput');
  if(fileInput.files[0]){fd.append('file',fileInput.files[0]);fileInput.value='';}

  abortCtrl=new AbortController();

  try{
    const res=await fetch('/',{method:'POST',body:fd,signal:abortCtrl.signal});
    const html=await res.text();

    // Parse the response to extract AI message
    const parser=new DOMParser();
    const doc=parser.parseFromString(html,'text/html');
    const aiMsgs=doc.querySelectorAll('.msg-a');
    const lastAi=aiMsgs[aiMsgs.length-1];

    if(lastAi){
      aRow.innerHTML=lastAi.innerHTML;
      // Extract files
      const filesDiv=doc.querySelector('.files-box');
      if(filesDiv){
        fsec.innerHTML=filesDiv.outerHTML;
        // Re-bind download buttons
        fsec.querySelectorAll('form').forEach(form=>{
          form.onsubmit=function(e){e.preventDefault();dlForm(this);};
        });
      }
    }

  }catch(e){
    if(e.name==='AbortError'){
      aRow.innerHTML='<div class="bbl bbl-a"><span style="color:#94a3b8">⏹ تم الإيقاف</span></div>';
    }else{
      aRow.innerHTML='<div class="bbl bbl-a"><span style="color:#ef4444">❌ خطأ: '+esc(String(e))+'</span></div>';
    }
  }

  setStreaming(false);
  type.classList.remove('on');
  abortCtrl=null;
  bot();
}

async function dlForm(form){
  const fd=new FormData(form);
  const res=await fetch('/download',{method:'POST',body:fd});
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=fd.get('filename');
  a.click();
  URL.revokeObjectURL(url);
}

function cpy(btn,b64){
  navigator.clipboard.writeText(atob(b64)).then(()=>{
    btn.textContent='✅ تم';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 نسخ';btn.classList.remove('ok')},1500);
  });
}

async function clearChat(){
  if(!confirm('مسح المحادثة؟'))return;
  if(streaming)await stopStream();
  try{await fetch('/clear',{method:'POST'});}catch(_){}
  msgs.innerHTML='';fsec.innerHTML='';
  welcome.style.display='block';
  Object.keys(pf).forEach(k=>delete pf[k]);
}

function saveChat(){
  if(!msgs.children.length){alert('لا يوجد شيء للحفظ');return;}
  const saved=JSON.parse(localStorage.getItem('leoai')||'[]');
  const first=msgs.querySelector('.bbl-u');
  saved.unshift({id:Date.now(),title:(first?.textContent||'محادثة').substring(0,45),date:new Date().toLocaleString('ar-SA'),html:msgs.innerHTML});
  if(saved.length>15)saved.pop();
  localStorage.setItem('leoai',JSON.stringify(saved));
  alert('✅ تم الحفظ');
}

function showSaved(){
  const saved=JSON.parse(localStorage.getItem('leoai')||'[]');
  if(!saved.length){alert('لا توجد محادثات');return;}
  const list=saved.map((c,i)=>`${i+1}. ${c.title} (${c.date})`).join('
');
  const n=prompt('اختر رقم:
'+list);
  if(n){const c=saved[parseInt(n)-1];if(c){welcome.style.display='none';msgs.innerHTML=c.html;bot();}}
}

window.onload=function(){bot();};
</script>
</body>
</html>
