<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الرموز البرمجية الخاص - Claude 4.6</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f1015;
            color: #e2e8f0;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 950px;
            background-color: #1a1c23;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        h1 { color: #ffb454; text-align: center; font-size: 22px; margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 140px;
            background-color: #0d0e12;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            font-size: 16px;
            resize: vertical;
        }
        textarea:focus { border-color: #ffb454; outline: none; }
        button {
            background-color: #ffb454;
            color: #0f1015;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s ease;
        }
        button:hover { background-color: #f7a23b; transform: translateY(-1px); }
        .result-container {
            margin-top: 25px;
            background-color: #0d0e12;
            padding: 20px;
            border-radius: 10px;
            border-right: 4px solid #ffb454;
        }
        .user-query { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
        .ai-code-output {
            white-space: pre-wrap;
            font-family: 'Consolas', 'Courier New', monospace;
            line-height: 1.7;
            color: #38bdf8;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💻 محطة التطوير والمساعد البرمجي الخاص بك (Claude 4.6 Sonnet)</h1>
    
    <form method="post">
        <textarea name="prompt" placeholder="اشرح البرنامج أو السكريبت الذي تريده باللغة العربية بالتفصيل..." required>{{ user_prompt if user_prompt }}</textarea>
        <button type="submit">توليد شفرة الكود فوراً</button>
    </form>

    {% if response %}
    <div class="result-container">
        <div class="user-query">💬 طلبك الحالي: {{ user_prompt }}</div>
        <hr style="border-color: #1e293b; margin-bottom: 15px;">
        <div class="ai-code-output">{{ response }}</div>
    </div>
    {% endif %}
</div>

</body>
</html>
