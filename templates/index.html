<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#0a0f1e">
<title>Leo-AI</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e; --bg2:#0d1426; --sf:#111827; --sf2:#1a2540;
  --bd:#1e2d4a; --bd2:#2a3f63;
  --ac:#b8c5d6; --ac2:#6b9fd4;
  --tx:#e8edf5; --mu:#6b7a99;
  --ok:#3ecf8e; --danger:#e85d6a; --warn:#e8a24a;
  --cbg:#080c18; --r:11px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);
     display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);height:52px;
     padding:0 7px;display:flex;align-items:center;gap:5px;
     flex-shrink:0;z-index:20;overflow:hidden}
.ddw{position:relative;flex-shrink:0}
.ddbtn{width:34px;height:34px;border-radius:8px;background:var(--sf);
       border:1px solid var(--bd);color:var(--ac);cursor:pointer;font-size:17px;
       display:flex;align-items:center;justify-content:center;transition:all .15s}
.ddbtn:active,.ddbtn.open{background:var(--sf2);border-color:var(--bd2)}
.ddm{position:fixed;top:52px;left:0;background:var(--bg2);
     border:1px solid var(--bd2);border-radius:0 12px 12px 0;
     min-width:210px;z-index:9999;overflow:hidden;
     transform:translateX(-110%);transition:transform .25s cubic-bezier(.4,0,.2,1);
     box-shadow:8px 0 32px rgba(0,0,0,.7)}
.ddm.show{transform:translateX(0)}
.dds{padding:4px 0}
.ddsep{height:1px;background:var(--bd);margin:3px 0}
.ddi{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
     font-size:13px;color:var(--tx);background:transparent;border:none;
     width:100%;text-align:right;text-decoration:none;transition:background .12s}
.ddi:active,.ddi:hover{background:var(--sf2)}
.ddi .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ddi .lbl{flex:1}
.ddi.danger:active,.ddi.danger:hover{background:rgba(232,93,106,.08)}
.ddi.danger .lbl{color:var(--danger)}
.logo{width:28px;height:28px;flex-shrink:0;background:linear-gradient(135deg,#1a2d4a,#0f1e38);
      border:1px solid var(--bd2);border-radius:8px;
      display:flex;align-items:center;justify-content:center;font-size:14px}
.rbadge{font-size:9px;border-radius:4px;padding:2px 5px;font-weight:700;
        flex-shrink:0;white-space:nowrap;letter-spacing:.4px}
.rbadge.admin{background:rgba(184,197,214,.1);color:var(--ac);border:1px solid rgba(184,197,214,.2)}
.rbadge.guest{background:rgba(107,159,212,.1);color:var(--ac2);border:1px solid rgba(107,159,212,.2)}
.hdrmid{flex:1;display:flex;justify-content:center;align-items:center;
        gap:4px;min-width:0;overflow:hidden}
.tabs{display:flex;background:var(--sf);border:1px solid var(--bd);
      border-radius:8px;padding:2px;gap:1px;flex-shrink:0}
.tab{padding:5px 8px;border-radius:6px;border:none;background:transparent;
     color:var(--mu);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab.on{background:var(--sf2);color:var(--tx);border:1px solid var(--bd2)}
.mpick{display:flex;align-items:center;gap:3px;background:var(--sf);border:1px solid var(--bd);
       border-radius:8px;padding:5px 7px;cursor:pointer;font-size:10.5px;color:var(--tx);
       max-width:88px;flex-shrink:1;min-width:0;transition:border-color .15s}
.mpick:active{border-color:var(--ac)}
.mpick .mn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;min-width:0;flex:1}
.mpick .arr{color:var(--mu);font-size:9px;flex-shrink:0;transition:transform .2s}
.mpick.open .arr{transform:rotate(180deg)}
.rfbtn{width:30px;height:30px;border-radius:7px;background:transparent;
       border:1px solid var(--bd);color:var(--mu);cursor:pointer;
       font-size:14px;display:flex;align-items:center;justify-content:center;
       flex-shrink:0;transition:all .15s}
.rfbtn:active{background:var(--sf2);color:var(--ac)}

/* OVERLAY & PANELS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.on{opacity:1;pointer-events:all}
.ddov{position:fixed;inset:0;z-index:9998;display:none}
.ddov.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--bg2);border-radius:16px 16px 0 0;border-top:1px solid var(--bd2);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:85vh;display:flex;flex-direction:column}
.sheet.on{transform:translateY(0)}
.shbar{width:32px;height:3px;background:var(--bd2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.shhead{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.shttl{font-size:15px;font-weight:700}
.shx{width:26px;height:26px;background:var(--sf);border:none;border-radius:50%;color:var(--mu);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.shlist{overflow-y:auto;padding:6px 8px 28px;flex:1}
.mi{display:flex;align-items:center;gap:10px;padding:9px;border-radius:9px;cursor:pointer;transition:background .12s}
.mi:active,.mi:hover{background:var(--sf)}
.mi.sel{background:rgba(184,197,214,.06)}
.miico{width:34px;height:34px;background:var(--sf);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mibody{flex:1;min-width:0}
.miname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tg{font-size:9px;font-weight:700;border-radius:3px;padding:2px 5px}
.tg.p{background:rgba(184,197,214,.1);color:var(--ac)}
.midesc{font-size:10px;color:var(--mu);margin-top:1px}
.michk{color:var(--ac);font-size:15px;font-weight:700;opacity:0;flex-shrink:0}
.mi.sel .michk{opacity:1}

/* PANELS & GITHUB STRUCTURES */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.pov.on{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(310px,90vw);background:var(--bg2);border-left:1px solid var(--bd2);z-index:51;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.panel.on{transform:translateX(0)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:13px;border-bottom:1px solid var(--bd);flex-shrink:0}
.phttl{font-size:14px;font-weight:700}
.phx{width:26px;height:26px;background:var(--sf);border:none;border-radius:50%;color:var(--mu);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.pb{flex:1;overflow-y:auto;padding:8px}
.pf{padding:8px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.sci{padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .12s}
.sci:active{background:var(--sf)}
.scit{display:flex;align-items:center;justify-content:space-between}
.sctl{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.scdl{background:transparent;border:none;color:var(--mu);cursor:pointer;font-size:13px}
.scdt{font-size:10px;color:var(--mu);margin-top:2px}

/* PAGES & PREVIEW */
.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.on{display:flex}
.ghpage{display:flex;flex:1;flex-direction:column;overflow:hidden}
.ghtopbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 10px;flex-shrink:0;display:flex;align-items:center;gap:7px}
.ghback{background:transparent;border:1px solid var(--bd);color:var(--tx);padding:5px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.ghtitle{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ghacts{display:flex;gap:5px;padding:7px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.gha{flex:1;min-width:0;padding:7px 4px;border:1px solid var(--bd);border-radius:7px;background:var(--sf);color:var(--tx);font-size:10px;font-weight:600;cursor:pointer;text-align:center}
.gha.ac{background:rgba(184,197,214,.12);color:var(--ac);border-color:var(--bd2)}
.membar{background:rgba(62,207,142,.05);border-bottom:1px solid rgba(62,207,142,.15);padding:6px 10px;flex-shrink:0;display:none;align-items:center;gap:6px;font-size:11px}
.membar.show{display:flex}
.memcnt{background:rgba(62,207,142,.15);color:var(--ok);border-radius:4px;padding:1px 7px;font-weight:700}
.memlbl{color:var(--mu);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.memclr,.memgo{padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;border:none}
.memclr{background:var(--sf);color:var(--mu);border:1px solid var(--bd)}
.memgo{background:rgba(184,197,214,.12);color:var(--ac)}
.ghsrch{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ghsrch input{width:100%;background:var(--sf);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:7px 11px;font-size:13px;outline:none}
.ghlist{flex:1;overflow-y:auto}
.repoi,.filei{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--bd);cursor:pointer}
.riico{width:34px;height:34px;background:var(--sf);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--bd)}
.riname{font-size:13px;font-weight:600}
.rimeta{font-size:10px;color:var(--mu);margin-top:2px}
.fichk{width:17px;height:17px;border:1.5px solid var(--bd2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px}
.filei.chk .fichk{background:rgba(184,197,214,.1);border-color:var(--ac)}
.fichi{opacity:0} .filei.chk .fichi{opacity:1}
.finame{font-size:12px;flex:1}

/* LIVE PREVIEW */
.pvp{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column}
.pvp.show{display:flex}
.pvh{background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.pvtitle{font-size:12.5px;font-weight:700;flex:1;color:var(--ac)}
.pvbtn{background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:5px 9px;border-radius:6px;font-size:10.5px;cursor:pointer}
#pvframe{flex:1;border:none;background:#fff;width:100%}
.pyout{background:var(--cbg);border-top:1px solid var(--bd);padding:10px 12px;font-family:monospace;font-size:12px;max-height:200px;overflow-y:auto;display:none;white-space:pre-wrap;color:var(--tx)}
.pyout.show{display:block}

/* CHAT AREA */
.chat{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:12px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:20px;text-align:center}
.empty .elogo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#1a2d4a,#0f1e38);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid var(--bd2)}
.sugs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.sug{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:11.5px;cursor:pointer}
.row{display:flex;gap:10px;margin:2px 0} .row.u{justify-content:flex-end}
.bbl{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.75;max-width:88%;word-wrap:break-word}
.bbl.u{background:var(--sf2);border:1px solid var(--bd2)}
.bbl.a{background:transparent;width:100%;max-width:100%;padding:4px 0}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.av.aa{background:linear-gradient(135deg,#19c37d,#ab68ff);order:-1}
.av.ua{background:linear-gradient(135deg,#ab68ff,#6b3fa0);order:-1}
.cw2{background:var(--cbg);border-radius:9px;margin:8px 0;border:1px solid var(--bd);overflow:hidden}
.ch{display:flex;padding:6px 12px;background:var(--sf);border-bottom:1px solid var(--bd);justify-content:space-between;align-items:center}
.ch span{color:var(--mu);font-size:11px}
.ch-btns button{background:transparent;border:1px solid var(--bd);color:var(--mu);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer}
pre{margin:0;padding:12px;overflow-x:auto;font-size:12px;color:#cdd6f4}
code{font-family:monospace}
.think{display:flex;align-items:center;gap:6px;padding:10px 14px;color:var(--mu);font-size:13px}
.think .dot{width:6px;height:6px;border-radius:50%;background:var(--ac2);animation:blink 1.4s infinite}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* INPUT CONTAINER */
.inpw{background:var(--bg2);border-top:1px solid var(--bd);padding:8px 10px 10px;flex-shrink:0}
.inpb{display:flex;gap:6px;align-items:flex-end}
.inpta{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;font-size:14px;color:var(--tx);outline:none;resize:none;max-height:120px;min-height:40px}
.inpbtn{width:34px;height:34px;border-radius:8px;background:var(--sf);border:1px solid var(--bd);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center}
.inpbtn.send{background:linear-gradient(135deg,#1a2d4a,#0f1e38);color:var(--ac);border-color:var(--bd2)}
.filechip{display:flex;align-items:center;gap:4px;background:rgba(107,159,212,.1);border:1px solid rgba(107,159,212,.2);border-radius:5px;padding:3px 8px;font-size:10px;color:var(--ac2);margin-top:4px}
.filechip .x{cursor:pointer;color:var(--mu)}

/* MODALS */
.modal,.savecf{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}
.modal.show,.savecf.show{display:flex}
.mdl,.savebox{background:var(--bg2);border:1px solid var(--bd2);border-radius:14px;width:min(320px,90vw);padding:20px}
.mdlbtns,.savebtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mdlbtn,.savebtn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.mdlbtn.prim{background:linear-gradient(135deg,#1a2d4a,#0f1e38);color:var(--ac)}
.mdlbtn.sec{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.savebtn.yes{background:var(--ok);color:#0a0f1e}
.savebtn.discard{background:var(--danger);color:#fff}

.stb{position:fixed;bottom:70px;right:14px;z-index:30;width:36px;height:36px;border-radius:50%;background:var(--sf);border:1px solid var(--bd2);color:var(--ac);display:none;align-items:center;justify-content:center}
.stb.show{display:flex}
.ldg{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:var(--bg)}
.ldg.show{display:flex}
.ldgsp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac2);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="ddw">
    <button class="ddbtn" id="menuBtn">☰</button>
    <div class="ddov" id="ddOv"></div>
    <div class="ddm" id="ddMenu">
      <div class="dds">
        <button class="ddi" onclick="openPanel('history')"><span class="ico">💬</span><span class="lbl">سجل المحادثات</span></button>
        <button class="ddi" onclick="openPanel('api')"><span class="ico">🔑</span><span class="lbl">مفاتيح API</span></button>
        <button class="ddi" onclick="openPage('github')"><span class="ico">📦</span><span class="lbl">مستودعات GitHub</span></button>
        <div class="ddsep"></div>
        <button class="ddi danger" onclick="clearAllData()"><span class="ico">🗑️</span><span class="lbl">مسح البيانات</span></button>
      </div>
    </div>
  </div>
  <div class="logo">🦁</div>
  <span class="rbadge" id="roleBadge">...</span>
  <div class="hdrmid">
    <div class="tabs">
      <button class="tab on" id="tChat" onclick="setTab('chat')">شات</button>
      <button class="tab" id="tPrv" onclick="setTab('preview')">معاينة</button>
    </div>
    <div class="mpick" id="modelBtn" onclick="openModels()">
      <span class="mn" id="modelName">تحميل...</span>
      <span class="arr">▼</span>
    </div>
    <button class="rfbtn" onclick="newChat()">＋</button>
  </div>
</header>

<div class="ov" id="ov" onclick="closeAll()"></div>

<div class="sheet" id="modelSheet">
  <div class="shbar"></div>
  <div class="shhead">
    <span class="shttl">اختر النموذج</span>
    <button class="shx" onclick="closeAll()">✕</button>
  </div>
  <div class="shlist" id="modelsList"></div>
</div>

<div class="pov" id="pov" onclick="closeAll()"></div>
<div class="panel" id="panel">
  <div class="ph">
    <span class="phttl" id="panelTitle">...</span>
    <button class="phx" onclick="closeAll()">✕</button>
  </div>
  <div class="pb" id="panelBody"></div>
  <div class="pf" id="panelFoot"></div>
</div>

<div class="page on" id="pMain">
  <div class="chat" id="chat">
    <div class="empty">
      <div class="elogo">🦁</div>
      <h2>كيف يمكنني مساعدتك اليوم؟</h2>
      <p>أنا Leo-AI، مساعدك الذكي المطور لإدارة المشاريع، كتابة الأكواد، وتصفح ملفات GitHub.</p>
      <div class="sugs">
        <div class="sug" onclick="setPrompt('اكتب كود صفحة هبوط بسيطة بالـ HTML و CSS')">صفحة هبوط جذابة ✨</div>
        <div class="sug" onclick="setPrompt('كيف أقوم بربط قاعدة بيانات SQLite مع FastAPI؟')">FastAPI & SQLite 🚀</div>
      </div>
    </div>
  </div>
  <button class="stb" id="stbBtn" onclick="scrollToBottom()">▼</button>
  <div class="inpw">
    <div id="fileChips"></div>
    <div class="inpb">
      <button class="inpbtn" onclick="el('fileInput').click()">📎</button>
      <input type="file" id="fileInput" style="display:none" multiple onchange="handleFileSelect(this)">
      <textarea class="inpta" id="msgInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
      <div class="inpbtns">
        <button class="inpbtn send" id="sendBtn" onclick="sendMessage()">➔</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="pGithub">
  <div class="ghpage">
    <div class="ghtopbar">
      <button class="ghback" onclick="ghBack()">➔ عودة</button>
      <span class="ghtitle" id="ghTitle">GitHub</span>
    </div>
    <div class="ghacts" id="ghActs"></div>
    <div class="membar" id="memBar">
      <span class="memcnt" id="memCount">0</span>
      <span class="memlbl" id="memLbl">ملفات في الذاكرة</span>
      <button class="memclr" onclick="clearMemory()">تفريغ</button>
      <button class="memgo" onclick="sendMemoryToChat()">إرسال للشات</button>
    </div>
    <div class="ghsrch">
      <input type="text" id="ghSrchInp" placeholder="بحث متاح هنا..." oninput="handleGhSearch(this.value)">
    </div>
    <div class="ghlist" id="ghList"></div>
  </div>
</div>

<div class="pvp" id="pPreview">
  <div class="pvh">
    <span class="pvtitle" id="pvTitle">المعاينة الحية النشطة</span>
    <button class="pvbtn" onclick="runPreviewCode()">🔄 تحديث</button>
    <button class="pvbtn" onclick="setTab('chat')">✕ إغلاق</button>
  </div>
  <iframe id="pvframe" sandbox="allow-scripts allow-modals"></iframe>
  <div class="pyout" id="pyOut"></div>
</div>

<div class="modal" id="modal">
  <div class="mdl">
    <div class="mdlt" id="mdlTitle">تنبيه</div>
    <div class="mdlp" id="mdlText">...</div>
    <div class="mdlbtns">
      <button class="mdlbtn sec" onclick="closeModal()">إلغاء</button>
      <button class="mdlbtn prim" id="mdlConfirm">تأكيد</button>
    </div>
  </div>
</div>

<div class="ldg" id="loading"><div class="ldgsp"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  FULL JAVASCRIPT SYSTEM & GITHUB PERSISTENCE
// ═══════════════════════════════════════════════════════════════════════════════
let state = {
  role: 'guest', chats: [], currentChatId: null, models: [], currentModel: '',
  files: [], mode: 'chat', ghPath: [], ghRepo: null, ghFiles: [], ghSearch: '',
  isGenerating: false, selectedFiles: new Set()
};

const el = id => document.getElementById(id);

function closeAll() {
  ['modelSheet','ov','panel','pov','ddMenu','ddOv'].forEach(id => {
    const e = el(id); if(e) e.classList.remove('on','show','open');
  });
}

if (el('menuBtn')) {
  el('menuBtn').addEventListener('click', e => {
    e.stopPropagation();
    el('ddMenu').classList.toggle('show');
    el('ddOv').classList.toggle('show');
  });
}
if (el('ddOv')) el('ddOv').addEventListener('click', closeAll);

function setTab(tab) {
  state.mode = tab;
  ['tChat','tPrv'].forEach(id => el(id)?.classList.remove('on'));
  ['pMain','pPreview'].forEach(id => el(id)?.classList.remove('on','show'));
  
  if (tab === 'chat') {
    el('tChat')?.classList.add('on');
    el('pMain')?.classList.add('on');
  } else if (tab === 'preview') {
    el('tPrv')?.classList.add('on');
    el('pPreview')?.classList.add('show');
    runPreviewCode();
  }
}

function openPage(page) {
  closeAll();
  ['pMain','pGithub'].forEach(id => el(id)?.classList.remove('on'));
  if (page === 'github') {
    el('pGithub')?.classList.add('on');
    loadRepos();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  API & CHAT SYSTEMS
// ═══════════════════════════════════════════════════════════════════════════════
async function renderModels() {
  try {
    const r = await fetch('/api/models');
    const data = await r.json();
    state.models = data.models || [];
    state.currentModel = data.current || '';
    if(el('modelName')) el('modelName').textContent = state.currentModel.split('/').pop() || 'اختر النموذج';
    
    let h = '';
    state.models.forEach(m => {
      h += `
        <div class="mi ${m.id === state.currentModel ? 'sel' : ''}" onclick="selectModel('${m.id}')">
          <div class="miico">🤖</div>
          <div class="mibody">
            <div class="miname">${m.name} <span class="tg p">Free</span></div>
            <div class="midesc">${m.id}</div>
          </div>
          <div class="michk">✓</div>
        </div>`;
    });
    if(el('modelsList')) el('modelsList').innerHTML = h;
  } catch (e) { console.error(e); }
}

async function selectModel(id) {
  try {
    closeAll();
    await fetch('/api/models', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model: id})
    });
    await renderModels();
  } catch (e) { console.error(e); }
}

async function loadChats() {
  try {
    const r = await fetch('/api/chats');
    const data = await r.json();
    state.chats = data.chats || [];
    state.role = data.role || 'guest';
    if(el('roleBadge')) {
      el('roleBadge').textContent = state.role === 'admin' ? '⚙️ أدمن' : '👤 زائر';
      el('roleBadge').className = `rbadge ${state.role}`;
    }
  } catch (e) { console.error(e); }
}

async function loadChat(id) {
  if (!id) return;
  try {
    el('loading')?.classList.add('show');
    const r = await fetch(`/api/chats/${id}`);
    const data = await r.json();
    state.currentChatId = id;
    localStorage.setItem('currentChat', id);
    renderMessages(data.messages || []);
  } catch (e) { console.error(e); }
  finally { el('loading')?.classList.remove('show'); }
}

function renderMessages(msgs) {
  const c = el('chat'); if (!c) return;
  if (msgs.length === 0) {
    c.innerHTML = `<div class="empty"><div class="elogo">🦁</div><h2>كيف يمكنني مساعدتك اليوم؟</h2></div>`;
    return;
  }
  let h = '';
  msgs.forEach(m => {
    if (!m.role || m.role === 'system') return;
    const isU = m.role === 'user';
    h += `
      <div class="row ${isU ? 'u' : 'a'}">
        <div class="av ${isU ? 'ua' : 'aa'}">${isU ? '👤' : '🦁'}</div>
        <div class="bbl ${isU ? 'u' : 'a'}">${isU ? escapeHtml(m.content) : formatMarkdown(m.content)}</div>
      </div>`;
  });
  c.innerHTML = h;
  scrollToBottom();
}

async function sendMessage() {
  const inp = el('msgInput'); if (!inp || state.isGenerating) return;
  const txt = inp.value.trim(); if (!txt && state.files.length === 0) return;
  
  inp.value = '';
  state.isGenerating = true;
  if(el('sendBtn')) el('sendBtn').disabled = true;
  
  if (!state.currentChatId) {
    const r = await fetch('/api/chats', {method: 'POST'});
    const d = await r.json();
    state.currentChatId = d.id;
    localStorage.setItem('currentChat', d.id);
    await loadChats();
  }
  
  try {
    const fd = new FormData();
    fd.append('message', txt);
    state.files.forEach(f => fd.append('files', f));
    state.files = [];
    if(el('fileChips')) el('fileChips').innerHTML = '';
    
    await fetch(`/api/chats/${state.currentChatId}/message`, {method: 'POST', body: fd});
    await loadChat(state.currentChatId);
  } catch (e) { console.error(e); }
  finally {
    state.isGenerating = false;
    if(el('sendBtn')) el('sendBtn').disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GITHUB ADVANCED INTEGRATION & MEMORY
// ═══════════════════════════════════════════════════════════════════════════════
async function loadRepos() {
  try {
    const r = await fetch('/api/github/repos');
    const repos = await r.json();
    let h = '';
    repos.forEach(repo => {
      h += `
        <div class="repoi" onclick="selectRepo('${repo.name}')">
          <div class="riico">📦</div>
          <div class="ribody">
            <div class="riname">${repo.name}</div>
            <div class="rimeta">فرع: ${repo.default_branch || 'main'}</div>
          </div>
        </div>`;
    });
    if(el('ghList')) el('ghList').innerHTML = h || '<div class="ghmt">لا توجد مستودعات متاحة، تأكد من إعداد الـ Token</div>';
  } catch (e) { console.error(e); }
}

function selectRepo(name) {
  state.ghRepo = name;
  state.ghPath = [];
  loadFiles();
}

async function loadFiles() {
  if (!state.ghRepo) return;
  try {
    const pathStr = state.ghPath.join('/');
    if(el('ghTitle')) el('ghTitle').textContent = `${state.ghRepo}/${pathStr}`;
    
    const r = await fetch(`/api/github/repos/${state.ghRepo}/files?path=${encodeURIComponent(pathStr)}`);
    const files = await r.json();
    state.ghFiles = files;
    renderGhFiles(files);
  } catch (e) { console.error(e); }
}

function renderGhFiles(files) {
  let h = '';
  files.forEach(f => {
    const isDir = f.type === 'dir';
    h += `
      <div class="filei" onclick="handleFileClick('${f.path}', '${f.type}')">
        <div class="fichk">📄</div>
        <div class="finame">${f.name}</div>
        <div class="rimeta">${isDir ? 'مجلد' : 'ملف'}</div>
      </div>`;
  });
  if(el('ghList')) el('ghList').innerHTML = h;
}

function handleFileClick(path, type) {
  if (type === 'dir') {
    state.ghPath.push(path.split('/').pop());
    loadFiles();
  } else {
    viewGhFile(path);
  }
}

async function viewGhFile(path) {
  try {
    const r = await fetch(`/api/github/repos/${state.ghRepo}/file/content?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    alert(`محتوى الملف ${path}:\n\n` + d.content.substring(0, 500) + '...');
  } catch (e) { console.error(e); }
}

function ghBack() {
  if (state.ghPath.length > 0) { state.ghPath.pop(); loadFiles(); }
  else if (state.ghRepo) { state.ghRepo = null; loadRepos(); }
  else { openPage('main'); }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HELPERS & RENDER RULES
// ═══════════════════════════════════════════════════════════════════════════════
function openModels() { closeAll(); el('modelSheet')?.classList.add('on'); el('ov')?.classList.add('on'); }
function setPrompt(v) { if(el('msgInput')) el('msgInput').value = v; }
function scrollToBottom() { const c = el('chat'); if(c) c.scrollTop = c.scrollHeight; }
function escapeHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

function handleFileSelect(inp) {
  state.files = Array.from(inp.files);
  let h = '';
  state.files.forEach((f, i) => { h += `<div class="filechip">📄 ${f.name}</div>`; });
  if(el('fileChips')) el('fileChips').innerHTML = h;
}

function openPanel(type) {
  closeAll(); el('panel')?.classList.add('on'); el('pov')?.classList.add('on');
  if(el('panelTitle')) el('panelTitle').textContent = type === 'history' ? 'سجل المحادثات' : 'مفاتيح الـ API';
  if(el('panelBody')) {
    if (type === 'history') {
      let h = '';
      state.chats.forEach(c => {
        h += `<div class="sci" onclick="loadChat('${c.id}')"><div class="scit"><span class="sctl">💬 ${escapeHtml(c.title || 'محادثة')}</span></div></div>`;
      });
      el('panelBody').innerHTML = h || '<div class="scmt">لا توجد محادثات</div>';
    } else {
      el('panelBody').innerHTML = '<div class="pb">المفاتيح مدارة ومحفوظة بالخلفية بشكل آمن.</div>';
    }
  }
}

function formatMarkdown(src) {
  let html = escapeHtml(src);
  html = html.replace(/```([\s\S]*?)```/gm, (match, code) => {
    return `<div class="cw2"><div class="ch"><span>CODE</span></div><pre><code>${code.trim()}</code></pre></div>`;
  });
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return html.replace(/\n/g, '<br>');
}

function runPreviewCode() {
  const fr = el('pvframe'); if (!fr) return;
  const codes = document.querySelectorAll('pre code');
  if (codes.length > 0) {
    const lastHtml = codes[codes.length - 1].innerText;
    const doc = fr.contentWindow.document;
    doc.open(); doc.write(lastHtml); doc.close();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  renderModels(); loadChats();
  const savedChat = localStorage.getItem('currentChat');
  if (savedChat) loadChat(savedChat);
  
  el('msgInput')?.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});
</script>
</body>
</html>
